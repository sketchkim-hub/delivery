<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>배송 신청 | 전통시장</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1a2e; --accent: #d4460a; --accent2: #e8650f;
  --surface: #f5f3ef; --card: #fff; --border: #e2ddd8;
  --muted: #8a8a9a; --green: #16a34a;
}
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: var(--surface); color: var(--ink); min-height: 100vh; }

/* ── 헤더 ── */
.hdr { background: var(--ink); color: #fff; padding: 14px 16px; text-align: center; }
.hdr h1 { font-size: 1.1rem; font-weight: 800; }
.hdr p { font-size: .78rem; opacity: .7; margin-top: 3px; }

/* ── 폼 ── */
.form-wrap { max-width: 480px; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.card { background: var(--card); border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card h3 { font-size: .82rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.field label { font-size: .75rem; font-weight: 700; color: var(--muted); }
.field input, .field select, .field textarea {
  border: 1.5px solid var(--border); border-radius: 8px; padding: 11px 12px;
  font-size: .95rem; font-family: inherit; background: var(--surface); color: var(--ink); width: 100%;
  transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent); background: #fff;
}
.field textarea { resize: vertical; min-height: 80px; }

/* ── 점포 버튼 ── */
.store-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.store-btn {
  padding: 13px 8px; border: 1.5px solid var(--border); border-radius: 9px;
  background: var(--surface); font-size: .88rem; font-weight: 700; font-family: inherit;
  color: var(--ink); cursor: pointer; text-align: center;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: all .13s;
}
.store-btn:hover { border-color: var(--accent); color: var(--accent); background: #fff5f2; }
.store-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.time-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.time-btn {
  padding: 12px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--surface); font-size: .88rem; font-weight: 700; font-family: inherit;
  cursor: pointer; text-align: center; touch-action: manipulation; transition: all .13s;
}
.time-btn.on { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── 물품 ── */
.goods-tag {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 12px 14px; font-size: .92rem; font-weight: 600; margin-bottom: 8px;
}
.goods-tag button { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem; padding: 0 6px; touch-action: manipulation; }
.goods-add-row { display: flex; flex-direction: column; gap: 8px; }
.goods-add-row .row { display: flex; gap: 8px; }
.goods-add-row input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 13px 12px; font-size: 1rem; font-family: inherit; background: var(--surface);
  color: var(--ink);
}
.goods-add-row input:focus { outline: none; border-color: var(--accent); background: #fff; }
.goods-add-row select {
  width: 110px; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 13px 8px; font-size: .92rem; font-family: inherit;
  background: var(--surface); color: var(--ink);
}
.plus-btn {
  padding: 14px 16px; background: var(--ink); color: #fff; border: none;
  border-radius: 9px; font-size: .95rem; font-weight: 700; font-family: inherit;
  cursor: pointer; width: 100%; touch-action: manipulation;
}

/* ── 제출 버튼 ── */
.submit-btn {
  width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none;
  border-radius: 12px; font-size: 1.05rem; font-weight: 900; font-family: inherit;
  cursor: pointer; box-shadow: 0 4px 14px rgba(212,70,10,.3);
  touch-action: manipulation; transition: all .15s;
}
.submit-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.submit-btn:disabled { background: #ccc; transform: none; box-shadow: none; cursor: not-allowed; }

/* ── 성공 화면 ── */
.success { display: none; text-align: center; padding: 40px 20px; }
.success .icon { font-size: 3.5rem; margin-bottom: 12px; }
.success h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 8px; }
.success p { font-size: .88rem; color: var(--muted); line-height: 1.6; }
.success .again-btn {
  margin-top: 20px; padding: 12px 28px; background: var(--ink); color: #fff;
  border: none; border-radius: 9px; font-size: .9rem; font-weight: 700;
  font-family: inherit; cursor: pointer;
}

/* ── 신청 목록 (관리자용 미리보기) ── */
.req-list { display: flex; flex-direction: column; gap: 8px; }
.req-item {
  background: var(--card); border-radius: 10px; padding: 12px 14px;
  border-left: 3px solid var(--accent); font-size: .82rem;
}
.req-item .req-name { font-weight: 800; font-size: .9rem; margin-bottom: 4px; }
.req-item .req-sub { color: var(--muted); line-height: 1.6; }
.req-item .req-new { display:inline-block; background:var(--accent); color:#fff; font-size:.65rem; font-weight:800; padding:1px 6px; border-radius:8px; margin-left:6px; }
.badge-new { background:var(--accent); color:#fff; font-size:.7rem; font-weight:800; padding:2px 7px; border-radius:10px; }

/* ── 토스트 ── */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; padding:9px 20px; border-radius:30px; font-size:.82rem; font-weight:600; pointer-events:none; opacity:0; transition:opacity .2s,transform .2s; z-index:9999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.err { background:var(--accent); }
.toast.ok { background:#1a5c2a; }
</style>
</head>
<body>

<div class="hdr">
  <h1>🛒 배송 신청</h1>
  <p>문창전통시장 배달 서비스</p>
</div>

<!-- 신청 폼 -->
<div class="form-wrap" id="formWrap">

  <!-- 점포 선택 -->
  <div class="card">
    <h3>🏪 점포 선택 *</h3>
    <div id="storeLoading" style="text-align:center;padding:12px;color:var(--muted);font-size:.85rem;">⏳ 점포 목록 로딩 중...</div>
    <div id="storeBtns" style="display:none;"></div>
    <div id="storeEmpty" style="display:none;color:var(--muted);font-size:.85rem;text-align:center;padding:10px;">등록된 점포가 없습니다</div>
  </div>

  <!-- 날짜/시간 -->
  <div class="card">
    <h3>📅 배송 일시</h3>
    <div class="field">
      <label>배송 날짜</label>
      <input type="date" id="rDate">
    </div>
    <div class="field">
      <label>배송 희망 시간</label>
      <div class="time-btns">
        <button class="time-btn" id="tb0" onclick="selTime(0)">오전 9:10</button>
        <button class="time-btn" id="tb1" onclick="selTime(1)">오후 1:10</button>
      </div>
    </div>
  </div>

  <!-- 받는 분 -->
  <div class="card">
    <h3>👤 받는 분 정보</h3>
    <div class="field"><label>받는 분 이름 *</label><input type="text" id="rName" placeholder="고객 이름" autocomplete="off"></div>
    <div class="field"><label>연락처</label><input type="tel" id="rPhone" placeholder="010-0000-0000" autocomplete="off"></div>
  </div>

  <!-- 배송 주소 -->
  <div class="card">
    <h3>📍 배송 주소</h3>
    <div class="field">
      <label>지역구 *</label>
      <select id="rGu">
        <option value="">선택하세요</option>
        <option>동구</option><option>중구</option><option>서구</option>
        <option>대덕구</option><option>유성구</option>
      </select>
    </div>
    <div class="field"><label>상세 주소 *</label><input type="text" id="rAddr" placeholder="예: 대흥동 300-5 현대아파트 101호" autocomplete="off"></div>
  </div>

  <!-- 물품 -->
  <div class="card">
    <h3>📦 물품 정보</h3>
    <div id="rGoodsList"></div>
    <div class="goods-add-row">
      <div class="row">
        <input type="text" id="rGoods" placeholder="물품명" autocomplete="off"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addGoods();}">
        <select id="rItem">
          <option value="">품목</option>
          <option>농산물</option><option>수산물</option><option>축산물</option>
          <option>가공식품</option><option>생활</option><option>의류</option><option>기타</option>
        </select>
      </div>
      <button class="plus-btn" onclick="addGoods()">＋ 물품 추가</button>
    </div>
  </div>

  <!-- 금액/상자 -->
  <div class="card">
    <h3>💰 추가 정보</h3>
    <div class="field"><label>금액 (원)</label><input type="number" id="rAmt" placeholder="0" min="0"></div>
    <div class="field"><label>상자 수</label><input type="number" id="rBox" placeholder="0" min="0"></div>
    <div class="field"><label>메모</label><textarea id="rMemo" placeholder="특이사항이 있으면 입력하세요"></textarea></div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitRequest()">📤 배송 신청하기</button>

</div>

<!-- 성공 화면 -->
<div class="success" id="successWrap">
  <div class="icon">✅</div>
  <h2>배송 신청 완료!</h2>
  <p id="successMsg"></p>
  <button class="again-btn" onclick="resetForm()">＋ 추가 신청하기</button>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDOm2OngRf5DwGOBAyGYk7-rmClkHBMj50",
  authDomain: "delivery-23728.firebaseapp.com",
  databaseURL: "https://delivery-23728-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "delivery-23728",
  storageBucket: "delivery-23728.firebasestorage.app",
  messagingSenderId: "203200824872",
  appId: "1:203200824872:web:2758175b0c8f253647971d"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

window._fbPush = async (path, data) => {
  try { await push(ref(db, path), data); return true; }
  catch(e) { console.error(e); return false; }
};
window._fbSet = async (path, data) => {
  try { await set(ref(db, path), data); return true; }
  catch(e) { return false; }
};
window._fbWatch = (path, cb) => {
  onValue(ref(db, path), snap => cb(snap.exists() ? snap.val() : null));
};
window._firebaseReady = true;
</script>

<script>
const TIMES = ['오전 9:10', '오후 1:10'];
let selTimeIdx = null;
let goodsList = [];
let selStoreIdx = null;
let storeList = [];

// 오늘 날짜 기본값
document.getElementById('rDate').value = new Date().toISOString().slice(0,10);

// Firebase 준비 후 점포 목록 로드
function loadStores() {
  if(!window._fbWatch) {
    setTimeout(loadStores, 500); return;
  }
  // Firebase에서 점포 목록 실시간 로드
  window._fbWatch('config/stores', (data)=>{
    storeList = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
    renderStores();
  });
}

function renderStores() {
  const loading = document.getElementById('storeLoading');
  const wrap    = document.getElementById('storeBtns');
  const empty   = document.getElementById('storeEmpty');

  loading.style.display = 'none';

  if(!storeList.length) {
    wrap.style.display  = 'none';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  wrap.style.display  = 'block';
  wrap.innerHTML = `<div class="store-grid">` +
    storeList.map((s,i)=>`
      <button class="store-btn${selStoreIdx===i?' on':''}" onclick="pickStore(${i})">
        ${s}
      </button>`).join('') +
    `</div>`;
}

function pickStore(i) {
  selStoreIdx = (selStoreIdx===i) ? null : i;
  renderStores();
}

// 점포 로드 시작 (Firebase 준비 대기)
if(window._firebaseReady) {
  loadStores();
} else {
  window.addEventListener('firebase-ready', loadStores);
  setTimeout(loadStores, 3000); // fallback
}

function selTime(i) {
  selTimeIdx = (selTimeIdx===i) ? null : i;
  document.getElementById('tb0').classList.toggle('on', selTimeIdx===0);
  document.getElementById('tb1').classList.toggle('on', selTimeIdx===1);
}

function addGoods() {
  const inp = document.getElementById('rGoods');
  const sel = document.getElementById('rItem');
  const name = inp.value.trim();
  if(!name) return;
  goodsList.push({ name, item: sel.value||'' });
  inp.value=''; sel.value=''; inp.focus();
  renderGoods();
}

function removeGoods(i) { goodsList.splice(i,1); renderGoods(); }

function renderGoods() {
  document.getElementById('rGoodsList').innerHTML = goodsList.map((g,i)=>`
    <div class="goods-tag">
      <span>📦 ${g.name}${g.item?' ('+g.item+')':''}</span>
      <button onclick="removeGoods(${i})">✕</button>
    </div>`).join('');
}

async function submitRequest() {
  const date  = document.getElementById('rDate').value;
  const name  = document.getElementById('rName').value.trim();
  const phone = document.getElementById('rPhone').value.trim();
  const gu    = document.getElementById('rGu').value;
  const addr  = document.getElementById('rAddr').value.trim();
  const amt   = document.getElementById('rAmt').value;
  const box   = document.getElementById('rBox').value;
  const memo  = document.getElementById('rMemo').value.trim();

  if(!date)  return toast('날짜를 선택하세요','err');
  if(selStoreIdx===null) return toast('점포를 선택하세요','err');
  if(!name)  return toast('받는 분 이름을 입력하세요','err');
  if(!gu)    return toast('지역구를 선택하세요','err');
  if(!addr)  return toast('배송 주소를 입력하세요','err');

  const store = storeList[selStoreIdx] || '미지정';

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 신청 중...';

  const fullAddr = gu + ' ' + addr;
  const timeLabel = selTimeIdx !== null ? TIMES[selTimeIdx] : '-';
  const addList = goodsList.length ? goodsList : [{name:'-', item:'-'}];

  if(!window._fbPush) {
    btn.disabled=false; btn.textContent='📤 배송 신청하기';
    return toast('연결 오류. 잠시 후 다시 시도하세요','err');
  }

  // 배송 요청을 Firebase requests 경로에 저장
  const reqData = {
    date, store, name, phone, addr: fullAddr, gu,
    time: timeLabel, amt: amt||'', box: box||'',
    memo, goods: addList, status: 'pending',
    requestedAt: new Date().toISOString()
  };

  const ok = await window._fbPush('requests/' + date, reqData);

  if(ok) {
    // FCM 토큰으로 푸시 알림 발송 (Firebase Functions 없이 REST API 사용)
    try {
      const tokenSnap = await window._fbGet('fcm_tokens/admin');
      if(tokenSnap && tokenSnap.token) {
        await fetch('https://fcm.googleapis.com/fcm/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'key=AAAA_SERVER_KEY_PLACEHOLDER'
          },
          body: JSON.stringify({
            to: tokenSnap.token,
            notification: {
              title: '🛒 새 배송 신청!',
              body: `${name} / ${fullAddr} (${timeLabel})`,
              click_action: 'https://sketchkim-hub.github.io/delivery'
            },
            data: { date, name, addr: fullAddr }
          })
        });
      }
    } catch(e) { console.warn('푸시 알림 발송 실패:', e); }
    // 배송 보고서 rows에도 자동 추가
    const groupId = Date.now();
    addList.forEach(async (g, gi) => {
      const row = {
        seq: 0, date, store, name, phone,
        goods: g.name, item: g.item||'-',
        amt: gi===0 ? (amt ? Math.round(Number(amt)) : '') : '',
        box: gi===0 ? (box||'-') : '',
        addr: fullAddr, gu: gu||'-', time: timeLabel,
        groupId, groupFirst: gi===0, groupSize: addList.length,
        fromRequest: true
      };
      await window._fbPush('requests_rows/' + date, row);
    });

    // 성공 화면 표시
    document.getElementById('formWrap').style.display = 'none';
    document.getElementById('successWrap').style.display = 'block';
    document.getElementById('successMsg').innerHTML =
      `<b>${name}</b>님의 배송 신청이 완료되었습니다.<br>` +
      `📅 ${date} ${timeLabel}<br>` +
      `📍 ${fullAddr}<br><br>` +
      `배송 담당자가 확인 후 처리해 드립니다.`;
  } else {
    toast('신청 실패. 다시 시도해 주세요','err');
    btn.disabled=false; btn.textContent='📤 배송 신청하기';
  }
}

function resetForm() {
  document.getElementById('formWrap').style.display = 'flex';
  document.getElementById('successWrap').style.display = 'none';
  document.getElementById('rName').value='';
  document.getElementById('rPhone').value='';
  document.getElementById('rAddr').value='';
  document.getElementById('rGu').value='';
  document.getElementById('rAmt').value='';
  document.getElementById('rBox').value='';
  document.getElementById('rMemo').value='';
  document.getElementById('rDate').value = new Date().toISOString().slice(0,10);
  selStoreIdx=null; renderStores();
  goodsList=[]; renderGoods();
  selTimeIdx=null;
  document.getElementById('tb0').classList.remove('on');
  document.getElementById('tb1').classList.remove('on');
  document.getElementById('submitBtn').disabled=false;
  document.getElementById('submitBtn').textContent='📤 배송 신청하기';
}

function toast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2500);
}
</script>
</body>
</html>
