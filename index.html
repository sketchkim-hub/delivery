<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>배송 일일 보고서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=443dbc1cfaf9df0e844d3e09c2fd2005&libraries=services"></script>
<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDOm2OngRf5DwGOBAyGYk7-rmClkHBMj50",
  authDomain: "delivery-23728.firebaseapp.com",
  databaseURL: "https://delivery-23728-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "delivery-23728",
  storageBucket: "delivery-23728.firebasestorage.app",
  messagingSenderId: "203200824872",
  appId: "1:203200824872:web:2758175b0c8f253647971d"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── Firebase 저장/로드 함수 전역 등록 ──
window._fbSet = async (path, data) => {
  try { await set(ref(db, path), data); return true; }
  catch(e) { console.warn('Firebase 저장 실패:', e); return false; }
};
window._fbGet = async (path) => {
  try {
    const snap = await get(ref(db, path));
    return snap.exists() ? snap.val() : null;
  } catch(e) { console.warn('Firebase 로드 실패:', e); return null; }
};
window._fbWatch = (path, cb) => {
  onValue(ref(db, path), snap => cb(snap.exists() ? snap.val() : null));
};
window._firebaseReady = true;
window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1a1a2e; --ink2: #2d2d44;
  --surface: #f5f3ef; --card: #fff;
  --accent: #d4460a; --accent2: #e8650f;
  --muted: #8a8a9a; --border: #e2ddd8;
  --donggu: #3b82f6; --junggu: #d4460a;
  --seogu: #16a34a; --daeduk: #9333ea; --yuseong: #ca8a04;
}
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background: var(--surface); color: var(--ink); font-size: 14px; }

/* ── 헤더 ── */
.hdr { background: var(--ink); color: #fff; height: 52px; display: flex; align-items: center; padding: 0 16px; gap: 10px; position: sticky; top: 0; z-index: 100; }
.hdr-title { font-size: 1rem; font-weight: 800; }
.hdr-title span { color: var(--accent2); }
.hdr-date { margin-left: auto; font-size: 0.75rem; opacity: .6; }
.hdr-btn { background: var(--accent); color: #fff; border: none; padding: 7px 13px; border-radius: 6px; font-size: 0.78rem; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
.hdr-btn.green { background: #16a34a; }

/* ── 레이아웃 ── */
.layout { display: grid; grid-template-columns: 300px 1fr 340px; height: calc(100vh - 52px); }

/* ── 패널 공통 ── */
.panel { overflow-y: auto; background: var(--card); }
.panel-left { border-right: 1px solid var(--border); padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.panel-right { border-left: 1px solid var(--border); display: flex; flex-direction: column; }

/* ── 섹션 라벨 ── */
.slabel { font-size: 0.68rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }

/* ── 필드 ── */
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.field input, .field select {
  border: 1.5px solid var(--border); border-radius: 7px; padding: 9px 10px;
  font-size: 0.9rem; font-family: inherit; background: var(--surface); color: var(--ink);
  width: 100%; transition: border-color .15s;
}
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); background: #fff; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.divider { height: 1px; background: var(--border); }

/* ── 점포 ── */
.store-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
.sbtn {
  padding: 9px 6px; border: 1.5px solid var(--border); border-radius: 7px;
  background: var(--surface); font-size: 0.78rem; font-weight: 700; font-family: inherit;
  color: var(--ink2); cursor: pointer; text-align: center; position: relative;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: all .13s;
}
.sbtn:hover { border-color: var(--accent); color: var(--accent); background: #fff5f2; }
.sbtn.on { border-color: var(--accent); background: var(--accent); color: #fff; }
.sbtn .x {
  position: absolute; top: 2px; right: 3px; font-size: 0.6rem; color: rgba(255,255,255,.5);
  background: none; border: none; cursor: pointer; padding: 1px 2px; line-height: 1;
}
.sbtn:not(.on) .x { color: rgba(0,0,0,.2); }
.store-add-btn {
  grid-column: 1/-1; padding: 8px; border: 1.5px dashed var(--border); border-radius: 7px;
  background: transparent; font-size: 0.78rem; color: var(--muted); cursor: pointer;
  font-family: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: all .13s;
}
.store-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.store-reset-btn {
  grid-column: 1/-1; padding: 7px; border: 1.5px dashed #fca5a5; border-radius: 7px;
  background: transparent; font-size: 0.75rem; color: #ef4444; cursor: pointer;
  font-family: inherit; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}

/* ── 물품 태그 ── */
.goods-tag {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 7px; padding: 7px 10px; font-size: 0.83rem; font-weight: 600;
}
.goods-tag .rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.85rem; padding: 0 3px; touch-action: manipulation; }
.goods-tag .rm:hover { color: var(--accent); }
.goods-add-row { display: flex; gap: 5px; }
.goods-add-row input {
  flex: 1; border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 10px;
  font-size: 0.88rem; font-family: inherit; background: var(--surface);
}
.goods-add-row input:focus { outline: none; border-color: var(--accent); background: #fff; }
.goods-add-row select {
  border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 6px;
  font-size: 0.82rem; font-family: inherit; background: var(--surface); color: var(--ink);
}
.plus-btn {
  padding: 8px 13px; background: var(--ink2); color: #fff; border: none;
  border-radius: 7px; font-size: 0.85rem; font-weight: 700; font-family: inherit;
  cursor: pointer; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}

/* ── 지역구 ── */
.gu-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; }
.gu-btn {
  padding: 10px 3px; border-radius: 7px; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 0.75rem; font-weight: 700; font-family: inherit;
  cursor: pointer; text-align: center; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent; transition: all .13s;
}
.gu-btn[data-gu="동구"]   { color: var(--donggu); }
.gu-btn[data-gu="중구"]   { color: var(--junggu); }
.gu-btn[data-gu="서구"]   { color: var(--seogu); }
.gu-btn[data-gu="대덕구"] { color: var(--daeduk); }
.gu-btn[data-gu="유성구"] { color: var(--yuseong); }
.gu-btn.on[data-gu="동구"]   { background: var(--donggu); color:#fff; border-color:var(--donggu); }
.gu-btn.on[data-gu="중구"]   { background: var(--junggu); color:#fff; border-color:var(--junggu); }
.gu-btn.on[data-gu="서구"]   { background: var(--seogu);  color:#fff; border-color:var(--seogu); }
.gu-btn.on[data-gu="대덕구"] { background: var(--daeduk); color:#fff; border-color:var(--daeduk); }
.gu-btn.on[data-gu="유성구"] { background: var(--yuseong);color:#fff; border-color:var(--yuseong); }
.addr-row { display: grid; grid-template-columns: 70px 1fr; gap: 6px; align-items: end; }
.gu-disp {
  padding: 9px 6px; border-radius: 7px; font-size: 0.82rem; font-weight: 700;
  background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); text-align: center;
  transition: all .15s;
}

/* ── 배송시간 ── */
.time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 6px; }
.tbtn {
  padding: 10px 6px; border: 1.5px solid var(--border); border-radius: 7px;
  background: var(--surface); font-size: 0.8rem; font-weight: 700; font-family: inherit;
  cursor: pointer; text-align: center; touch-action: manipulation;
  -webkit-tap-highlight-color: transparent; transition: all .13s; position: relative;
}
.tbtn:hover { border-color: var(--ink2); }
.tbtn.on { background: var(--ink2); color: #fff; border-color: var(--ink2); }
.tbtn .x { position: absolute; top:2px; right:3px; font-size:.6rem; color:rgba(0,0,0,.2); background:none; border:none; cursor:pointer; padding:1px 2px; }
.tbtn.on .x { color:rgba(255,255,255,.5); }
.time-add-row { display: grid; grid-template-columns: auto auto auto auto; gap: 5px; align-items: center; }
.time-add-row select {
  border: 1.5px solid var(--border); border-radius: 7px; padding: 8px 5px;
  font-size: 0.82rem; font-family: inherit; background: var(--surface); color: var(--ink);
}

/* ── 추가 버튼 ── */
.add-btn {
  width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none;
  border-radius: 9px; font-size: 1rem; font-weight: 900; font-family: inherit;
  cursor: pointer; box-shadow: 0 3px 12px rgba(212,70,10,.25);
  touch-action: manipulation; -webkit-tap-highlight-color: transparent; transition: all .15s;
}
.add-btn:hover { background: var(--accent2); transform: translateY(-1px); }

/* ── 가운데 목록 패널 ── */
.sum-bar {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap;
  background: var(--card);
}
.sum-total { font-size: 1.4rem; font-weight: 900; letter-spacing: -.04em; }
.sum-total small { font-size: .72rem; font-weight: 500; color: var(--muted); margin-left: 2px; }
.gu-pill { font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:20px; }
.gu-pill.동구   { background:#eff6ff; color:var(--donggu); }
.gu-pill.중구   { background:#fff5f2; color:var(--junggu); }
.gu-pill.서구   { background:#f0fdf4; color:var(--seogu); }
.gu-pill.대덕구 { background:#faf5ff; color:var(--daeduk); }
.gu-pill.유성구 { background:#fefce8; color:var(--yuseong); }
.clear-btn { margin-left:auto; background:transparent; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:6px; font-size:.72rem; font-family:inherit; cursor:pointer; }
.clear-btn:hover { border-color:var(--accent); color:var(--accent); }

.tbl-wrap { flex:1; overflow:auto; }
table { width:100%; border-collapse:collapse; font-size:.8rem; }
thead { position:sticky; top:0; z-index:10; }
thead th { background:var(--ink); color:rgba(255,255,255,.85); padding:8px 9px; text-align:center; font-size:.7rem; font-weight:700; white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--border); transition:background .1s; }
tbody tr:nth-child(even) { background:#faf9f7; }
tbody tr:hover { background:#fff5f2; }
tbody td { padding:7px 9px; text-align:center; vertical-align:middle; }
td.tc-store { font-weight:700; color:var(--accent); }
td.tc-name  { font-weight:600; }
td.tc-addr  { color:var(--muted); font-size:.75rem; }
td.tc-amt   { font-weight:700; font-variant-numeric:tabular-nums; }
.gu-tag { display:inline-block; padding:2px 7px; border-radius:10px; font-size:.68rem; font-weight:700; }
.gu-tag.동구   { background:#eff6ff; color:var(--donggu); }
.gu-tag.중구   { background:#fff5f2; color:var(--junggu); }
.gu-tag.서구   { background:#f0fdf4; color:var(--seogu); }
.gu-tag.대덕구 { background:#faf5ff; color:var(--daeduk); }
.gu-tag.유성구 { background:#fefce8; color:var(--yuseong); }
.del-btn { background:none; border:none; cursor:pointer; color:var(--border); font-size:.88rem; padding:2px 4px; border-radius:4px; transition:all .1s; touch-action:manipulation; }
.del-btn:hover { color:var(--accent); background:#fff5f2; }
.print-btn { background:none; border:none; cursor:pointer; color:var(--muted); font-size:1rem; padding:2px 4px; border-radius:4px; transition:all .1s; touch-action:manipulation; }
.print-btn:hover { color:var(--ink2); }
.empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .ei { font-size:2.5rem; margin-bottom:8px; }

/* ── 지도 패널 ── */
.panel-right .map-toolbar {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; background: var(--card);
}
.route-btn { background:var(--accent); color:#fff; border:none; padding:7px 13px; border-radius:7px; font-size:.78rem; font-weight:700; font-family:inherit; cursor:pointer; margin-left:auto; }
.route-btn:hover { background:var(--accent2); }
.route-reset-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:7px 9px; border-radius:7px; font-size:.78rem; font-family:inherit; cursor:pointer; }
#kakaoMap { width:100%; height:45%; flex-shrink:0; }
.route-list { flex:1; overflow-y:auto; padding:10px 14px; }
.route-card { display:flex; align-items:flex-start; gap:9px; padding:8px 0; border-bottom:1px solid var(--border); font-size:.8rem; }
.route-num { min-width:24px; height:24px; border-radius:50%; background:var(--accent); color:#fff; font-weight:900; font-size:.72rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.route-info { flex:1; line-height:1.5; }
.route-name { font-weight:800; }
.route-addr { color:var(--muted); font-size:.72rem; }
.route-goods { font-size:.72rem; color:var(--ink2); }
.action-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
.kakao-btn { padding:11px 8px; background:#FEE500; color:#3C1E1E; border:none; border-radius:9px; font-size:.8rem; font-weight:900; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
.share-btn { padding:11px 8px; background:var(--ink2); color:#fff; border:none; border-radius:9px; font-size:.8rem; font-weight:900; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }

/* 순서 조정 */
.route-card-wrap { position:relative; }
.route-card-wrap.dragging { opacity:.5; background:#fff5f2; border-radius:8px; }
.order-btns { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
.ord-btn {
  width:26px; height:22px; border:1px solid var(--border); border-radius:5px;
  background:var(--surface); color:var(--muted); font-size:.75rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent;
  transition:all .12s; font-family:inherit;
}
.ord-btn:hover:not(:disabled) { background:var(--ink2); color:#fff; border-color:var(--ink2); }
.ord-btn:disabled { opacity:.25; cursor:default; }
.reorder-tip { font-size:.7rem; color:var(--muted); text-align:center; padding:6px 0 2px; }

/* ── 모달 ── */
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#fff; border-radius:14px; padding:22px; width:300px; max-width:92vw; box-shadow:0 20px 60px rgba(0,0,0,.2); }
.modal h3 { font-size:.95rem; font-weight:800; margin-bottom:14px; }
.modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
.btn-cancel { padding:8px 14px; border-radius:7px; border:1px solid var(--border); background:var(--surface); color:var(--ink); font-family:inherit; font-size:.83rem; font-weight:600; cursor:pointer; }
.btn-ok { padding:8px 16px; border-radius:7px; border:none; background:var(--accent); color:#fff; font-family:inherit; font-size:.83rem; font-weight:700; cursor:pointer; }

/* ── 토스트 ── */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; padding:9px 20px; border-radius:30px; font-size:.82rem; font-weight:600; pointer-events:none; opacity:0; transition:opacity .2s,transform .2s; z-index:9999; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { background:#1a5c2a; }
.toast.err { background:var(--accent); }

/* ── 라벨 인쇄 ── */
#printArea { display:none; }
@media print {
  body > *:not(#printArea) { display:none !important; }
  #printArea { display:block !important; margin:0; padding:0; }
  @page { size:150mm 100mm; margin:2mm; }
  .label-card { width:146mm; height:96mm; box-sizing:border-box; font-family:'Malgun Gothic',sans-serif; }
  .label-card table { width:100%; height:96mm; border-collapse:collapse; }
  .label-card td { border:3px solid #000; padding:2mm 3mm; vertical-align:middle; }
  .lbl-h { font-weight:900; text-align:center; width:18mm; white-space:pre-line; background:#e8e8e8; font-size:14pt; line-height:1.3; }
  .lbl-v { font-size:16pt; }
  .lbl-big { font-size:22pt; font-weight:900; }
  .lbl-addr { font-size:17pt; font-weight:700; }
  .lbl-goods { font-size:16pt; white-space:pre-line; vertical-align:top; }
}

/* ── 모바일 탭바 ── */
.mob-tab-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:var(--ink); z-index:400; height:56px; }
.mob-tab-bar .tabs { display:grid; grid-template-columns:1fr 1fr 1fr; height:100%; }
.mob-tab { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:rgba(255,255,255,.5); font-size:.62rem; font-weight:700; border:none; background:none; cursor:pointer; font-family:inherit; touch-action:manipulation; }
.mob-tab .ti { font-size:1.2rem; line-height:1; }
.mob-tab.on { color:var(--accent2); }
.mob-badge { background:var(--accent); color:#fff; font-size:.58rem; font-weight:900; padding:1px 5px; border-radius:10px; }

/* ── 모바일 반응형 ── */
@media (max-width: 768px) {
  .layout { grid-template-columns:1fr; height:auto; }
  .hdr-date { display:none; }

  /* 공통 패널 */
  .panel-left, .panel-mid, .panel-right {
    display:none;
    position:fixed;
    top:52px; left:0; right:0; bottom:56px;
    background:var(--card);
    z-index:10;
  }
  .panel-left.on, .panel-mid.on, .panel-right.on { display:flex; }

  /* 입력/목록 패널: 스크롤 가능 */
  .panel-left {
    padding:14px;
    flex-direction:column;
    gap:12px;
    overflow-y:scroll;
    -webkit-overflow-scrolling:touch;
  }
  .panel-mid {
    flex-direction:column;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  /* 지도 패널: overflow 완전 제거 (iOS 카카오맵 터치 이슈 방지) */
  .panel-right {
    flex-direction:column;
    overflow:hidden;
  }

  /* 지도 패널 내부 목록만 스크롤 */
  .route-list {
    flex:1;
    overflow-y:scroll;
    -webkit-overflow-scrolling:touch;
    padding:10px 14px;
  }

  /* 카카오맵 - iOS에서 정확한 높이 강제 지정 */
  #kakaoMap {
    width:100% !important;
    height:45vh !important;
    min-height:200px !important;
    flex-shrink:0 !important;
    position:relative !important;
    z-index:1 !important;
  }

  .mob-tab-bar { display:block; }
  .row2 { grid-template-columns:1fr; }
  .field input, .field select { padding:11px 12px; font-size:1rem; }
  .gu-btn { padding:12px 3px; font-size:.82rem; }
  .tbtn { padding:12px 6px; font-size:.85rem; }
  .add-btn { padding:15px; font-size:1rem; }
}
@media (min-width: 769px) {
  .panel-left, .panel-mid, .panel-right { display:flex !important; }
}
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<div class="hdr">
  <span>🚐</span>
  <div class="hdr-title">배송 <span>일일보고서</span></div>
  <div id="syncStatus" style="display:none;font-size:.72rem;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:12px;white-space:nowrap;"></div>
  <div class="hdr-date" id="hdrDate"></div>
  <button class="hdr-btn green" onclick="calcRoute()">🗺️ 동선 계산</button>
  <button class="hdr-btn" onclick="exportExcel()">📥 엑셀</button>
</div>

<div class="layout">

<!-- ── 왼쪽: 입력 패널 ── -->
<div class="panel panel-left" id="pLeft">

  <!-- 날짜/순번 -->
  <div class="row2">
    <div class="field"><label>날짜</label><input type="date" id="fDate"></div>
    <div class="field"><label>순번(자동)</label><input type="text" id="fSeq" readonly style="background:#f0ede8;color:var(--muted);" placeholder="자동"></div>
  </div>

  <div class="divider"></div>

  <!-- 점포 -->
  <div>
    <div class="slabel">점포</div>
    <div class="store-grid" id="storeGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- 고객명/연락처 -->
  <div class="row2">
    <div class="field"><label>고객명</label><input type="text" id="fName" placeholder="고객 이름" autocomplete="off"></div>
    <div class="field"><label>연락처</label><input type="tel" id="fPhone" placeholder="010-0000-0000" autocomplete="off"></div>
  </div>

  <!-- 물품 -->
  <div>
    <div class="slabel">물품 <span id="gCount" style="color:var(--accent);text-transform:none;letter-spacing:0;font-size:.8rem;"></span></div>
    <div id="gList" style="display:flex;flex-direction:column;gap:5px;margin-bottom:6px;"></div>
    <div class="goods-add-row" style="flex-direction:column;gap:5px;">
      <div style="display:flex;gap:5px;">
        <input type="text" id="fGoods" placeholder="물품명" autocomplete="off" style="flex:1;"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addGoods();}">
        <select id="fItem" style="width:90px;">
          <option value="">품목</option>
          <option>농산물</option><option>수산물</option><option>축산물</option>
          <option>가공식품</option><option>생활</option><option>의류</option><option>기타</option>
        </select>
      </div>
      <button class="plus-btn" onclick="addGoods()" style="width:100%;">＋ 물품 추가</button>
    </div>
  </div>

  <!-- 금액 -->
  <div class="field"><label>전체 금액 (원)</label><input type="number" id="fAmt" placeholder="0" min="0" step="1"></div>

  <div class="divider"></div>

  <!-- 지역구 -->
  <div>
    <div class="slabel">지역구</div>
    <div class="gu-grid">
      <button class="gu-btn" data-gu="동구"   onclick="selGu(this)">동구</button>
      <button class="gu-btn" data-gu="중구"   onclick="selGu(this)">중구</button>
      <button class="gu-btn" data-gu="서구"   onclick="selGu(this)">서구</button>
      <button class="gu-btn" data-gu="대덕구" onclick="selGu(this)">대덕구</button>
      <button class="gu-btn" data-gu="유성구" onclick="selGu(this)">유성구</button>
    </div>
  </div>

  <!-- 주소 -->
  <div class="field">
    <label>주소 (동 입력)</label>
    <div class="addr-row">
      <div class="gu-disp" id="guDisp">구 선택</div>
      <input type="text" id="fDong" placeholder="예: 부사동" autocomplete="off">
    </div>
  </div>

  <div class="divider"></div>

  <!-- 상자 -->
  <div class="field"><label>상자 수</label><input type="number" id="fBox" placeholder="0" min="0"></div>

  <div class="divider"></div>

  <!-- 배송시간 -->
  <div>
    <div class="slabel">배송 시간</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
      <button id="tBtn0" class="tbtn" onclick="pickTimeFixed(0)">오전 9:10</button>
      <button id="tBtn1" class="tbtn" onclick="pickTimeFixed(1)">오후 1:10</button>
    </div>
  </div>

  <div class="divider"></div>

  <button class="add-btn" onclick="addRow()">＋ 목록에 추가</button>
  <button id="cancelEditBtn" onclick="cancelEdit()" style="display:none;width:100%;padding:10px;background:#f3f4f6;color:#6b7280;border:none;border-radius:9px;font-size:.88rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;">✕ 수정 취소</button>
</div><!-- /panel-left -->

<!-- ── 가운데: 목록 패널 ── -->
<div class="panel panel-mid" id="pMid" style="flex-direction:column;">
  <div class="sum-bar">
    <div class="sum-total"><span id="sumN">0</span><small>건</small></div>
    <div id="guPills" style="display:flex;gap:5px;flex-wrap:wrap;"></div>
    <button class="clear-btn" onclick="clearAll()">전체 삭제</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>순번</th><th>날짜</th><th>배송시간</th><th>점포</th><th>고객명</th>
        <th>물품</th><th>주소</th><th>금액</th><th>품목</th><th>상자</th><th>지역구</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- ── 오른쪽: 지도 패널 ── -->
<div class="panel panel-right" id="pRight">
  <div class="map-toolbar">
    <span style="font-weight:800;font-size:.9rem;">🗺️ 최적 배송 동선</span>
    <button class="route-btn" onclick="calcRoute()">🚗 동선 계산</button>
    <button class="route-reset-btn" onclick="resetRoute()">↺</button>
  </div>
  <div id="kakaoMap"></div>
  <div class="route-list" id="routeList">
    <div class="empty-state"><div class="ei">🚗</div><p style="font-size:.85rem;">동선 계산 버튼을 눌러주세요</p></div>
  </div>
</div>

</div><!-- /layout -->

<!-- 모바일 탭바 -->
<div class="mob-tab-bar">
  <div class="tabs">
    <button class="mob-tab on" id="t0" onclick="mobTab(0)"><span class="ti">✏️</span>입력</button>
    <button class="mob-tab" id="t1" onclick="mobTab(1)"><span class="ti">📋</span>목록<span class="mob-badge" id="mBadge" style="display:none;">0</span></button>
    <button class="mob-tab" id="t2" onclick="mobTab(2)"><span class="ti">🗺️</span>동선</button>
  </div>
</div>

<!-- 점포 추가 모달 -->
<div class="modal-bg" id="storeModal">
  <div class="modal">
    <h3>🏪 점포 추가</h3>
    <div class="field" style="margin-bottom:12px;"><label>점포명</label><input type="text" id="mStoreName" placeholder="점포 이름"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeStoreModal()">취소</button>
      <button class="btn-ok" onclick="doAddStore()">추가</button>
    </div>
  </div>
</div>

<!-- 라벨 인쇄 모달 -->
<div class="modal-bg" id="labelModal">
  <div class="modal" style="width:400px;">
    <h3>🖨 라벨 미리보기</h3>
    <div id="labelPreview" style="border:1px solid var(--border);border-radius:8px;overflow:hidden;aspect-ratio:15/10;margin-bottom:14px;background:#fff;"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="document.getElementById('labelModal').classList.remove('open')">닫기</button>
      <button class="btn-ok" onclick="doPrint()">🖨 인쇄</button>
    </div>
  </div>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════
//  상수 & 초기 데이터
// ════════════════════════════════════
const ITEMS = ['농산물','수산물','축산물','가공식품','생활','의류','기타'];
const GU_COLOR = {동구:'#3b82f6',중구:'#d4460a',서구:'#16a34a',대덕구:'#9333ea',유성구:'#ca8a04'};
const DEPART = {
  name:'문창전통시장',
  addr:'대전광역시 중구 보문로20번길 22',
  lat: 36.32791,  // 하드코딩 (geocoding 실패 대비)
  lng: 127.42748
};

let stores  = JSON.parse(localStorage.getItem('ds2_stores') || '[]');
let times   = JSON.parse(localStorage.getItem('ds2_times')  || '["오전 9:10","오후 1:10"]');
let rows    = [];
let goodsList = [];
let selStore = null, selGuVal = null, selTime = null;

function todayKey() { return new Date().toISOString().slice(0,10); }

// ── 날짜별 행 저장 (Firebase + localStorage 이중 저장) ──
async function saveRows() {
  const key = document.getElementById('fDate').value || todayKey();
  localStorage.setItem('ds2_rows_'+key, JSON.stringify(rows));
  if(window._fbSet) await window._fbSet('rows/'+key, rows.length ? rows : null);
}

// ── 날짜별 행 로드 ──
async function loadRows(dateKey) {
  // Firebase 우선, 실패 시 localStorage
  if(window._fbGet) {
    const fbData = await window._fbGet('rows/'+dateKey);
    if(fbData) {
      rows = Array.isArray(fbData) ? fbData : Object.values(fbData);
      localStorage.setItem('ds2_rows_'+dateKey, JSON.stringify(rows));
      return;
    }
  }
  rows = JSON.parse(localStorage.getItem('ds2_rows_'+dateKey) || '[]');
}

// ── 점포 저장 ──
async function saveStores() {
  localStorage.setItem('ds2_stores', JSON.stringify(stores));
  if(window._fbSet) await window._fbSet('config/stores', stores);
}

// ── 점포 로드 ──
async function loadStores() {
  if(window._fbGet) {
    const fbData = await window._fbGet('config/stores');
    if(fbData) {
      stores = Array.isArray(fbData) ? fbData : Object.values(fbData);
      localStorage.setItem('ds2_stores', JSON.stringify(stores));
      return;
    }
  }
  stores = JSON.parse(localStorage.getItem('ds2_stores') || '[]');
}

// ── 배송시간 저장 ──
async function saveTimes() {
  localStorage.setItem('ds2_times', JSON.stringify(times));
  if(window._fbSet) await window._fbSet('config/times', times);
}

// ── 배송시간 로드 ──
async function loadTimes() {
  if(window._fbGet) {
    const fbData = await window._fbGet('config/times');
    if(fbData) {
      times = Array.isArray(fbData) ? fbData : Object.values(fbData);
      localStorage.setItem('ds2_times', JSON.stringify(times));
      return;
    }
  }
  times = JSON.parse(localStorage.getItem('ds2_times') || '["오전 9:10","오후 1:10"]');
}

// ════════════════════════════════════
//  초기화
// ════════════════════════════════════
async function initApp() {
  const d = new Date();
  const dateKey = d.toISOString().slice(0,10);
  document.getElementById('fDate').value = dateKey;
  document.getElementById('hdrDate').textContent =
    d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

  // 동기화 상태 표시
  showSyncStatus('⏳ 데이터 로드 중...');

  // Firebase에서 로드
  await loadStores();
  await loadRows(dateKey);

  renderStores();
  renderTable();
  updateSeq();
  showSyncStatus('✅ 동기화 완료');
  setTimeout(()=>showSyncStatus(''), 2000);

  // 날짜 변경 시 해당 날짜 데이터 로드
  document.getElementById('fDate').addEventListener('change', async (e)=>{
    const newDate = e.target.value;
    showSyncStatus('⏳ '+newDate+' 로드 중...');
    await loadRows(newDate);
    renderTable(); updateSeq();
    showSyncStatus('✅ '+newDate+' 로드 완료');
    setTimeout(()=>showSyncStatus(''), 2000);
  });

  // Firebase 실시간 감지 (다른 기기에서 변경 시 자동 반영)
  if(window._fbWatch) {
    window._fbWatch('rows/'+dateKey, (data)=>{
      if(!data) return;
      const newRows = Array.isArray(data) ? data : Object.values(data);
      // 현재 데이터와 다를 때만 업데이트
      if(JSON.stringify(newRows) !== JSON.stringify(rows)) {
        rows = newRows;
        renderTable(); updateSeq();
        showSyncStatus('🔄 다른 기기에서 업데이트됨');
        setTimeout(()=>showSyncStatus(''), 2000);
      }
    });
  }

  if(window.kakao && kakao.maps) kakao.maps.load(()=>{
    initMap();
    if(rows.length) setTimeout(rebuildPreviewMarkers, 1000);
  });
}

function showSyncStatus(msg) {
  let el = document.getElementById('syncStatus');
  if(!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// Firebase 준비 완료 후 또는 바로 실행
if(window._firebaseReady) {
  window.addEventListener('DOMContentLoaded', initApp);
} else {
  window.addEventListener('firebase-ready', initApp);
  window.addEventListener('DOMContentLoaded', ()=>{
    // Firebase 3초 내 미준비 시 localStorage로 fallback
    setTimeout(()=>{ if(!window._firebaseReady) initApp(); }, 3000);
  });
}

// ════════════════════════════════════
//  점포
// ════════════════════════════════════
function renderStores() {
  const g = document.getElementById('storeGrid');
  let html = '';
  if(!stores.length) {
    html += `<div style="grid-column:1/-1;text-align:center;padding:10px 0;font-size:.78rem;color:var(--muted);">아래 버튼으로 점포를 추가하세요</div>`;
  }
  stores.forEach((s,i) => {
    html += `<div style="position:relative;">
      <button class="sbtn${selStore===i?' on':''}" onclick="pickStore(${i})">${s}</button>
      <button class="x" onclick="delStore(${i});event.stopPropagation();" style="position:absolute;top:3px;right:3px;background:none;border:none;cursor:pointer;font-size:.62rem;color:rgba(0,0,0,.25);padding:1px 3px;touch-action:manipulation;">✕</button>
    </div>`;
  });
  html += `<button class="store-add-btn" onclick="openStoreModal()">＋ 점포 추가</button>`;
  if(stores.length) html += `<button class="store-reset-btn" onclick="resetStores()">🗑 점포 초기화</button>`;
  g.innerHTML = html;
}
function pickStore(i) {
  selStore = (selStore===i) ? null : i;
  renderStores();
  resetFields();
}
function openStoreModal() {
  document.getElementById('storeModal').classList.add('open');
  setTimeout(()=>document.getElementById('mStoreName').focus(), 50);
}
function closeStoreModal() {
  document.getElementById('storeModal').classList.remove('open');
  document.getElementById('mStoreName').value='';
}
function doAddStore() {
  const n = document.getElementById('mStoreName').value.trim();
  if(!n) return toast('점포명을 입력하세요','err');
  stores.push(n); saveStores(); renderStores(); closeStoreModal();
  toast('✅ '+n+' 추가됨','ok');
}
function delStore(i) {
  if(!confirm(`"${stores[i]}" 점포를 삭제하시겠습니까?`)) return;
  if(selStore===i) selStore=null; else if(selStore>i) selStore--;
  stores.splice(i,1); saveStores(); renderStores();
}
function resetStores() {
  if(!confirm('점포 목록을 전부 초기화하시겠습니까?')) return;
  stores=[]; selStore=null; saveStores(); renderStores();
}
document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('storeModal').classList.contains('open')) doAddStore();
});

// ════════════════════════════════════
//  지역구
// ════════════════════════════════════
function selGu(btn) {
  const gu = btn.dataset.gu;
  selGuVal = (selGuVal===gu) ? null : gu;
  document.querySelectorAll('.gu-btn').forEach(b=>b.classList.remove('on'));
  const d = document.getElementById('guDisp');
  if(selGuVal) {
    btn.classList.add('on');
    d.textContent = selGuVal;
    d.style.color = GU_COLOR[selGuVal];
    d.style.borderColor = GU_COLOR[selGuVal];
  } else {
    d.textContent='구 선택'; d.style.color='var(--muted)'; d.style.borderColor='var(--border)';
  }
}

// ════════════════════════════════════
//  물품
// ════════════════════════════════════
function addGoods() {
  const inp = document.getElementById('fGoods');
  const sel = document.getElementById('fItem');
  const name = inp.value.trim();
  if(!name) return;
  goodsList.push({ name, item: sel.value||'' });
  inp.value=''; sel.value=''; inp.focus();
  renderGoods();
}
function removeGoods(i) { goodsList.splice(i,1); renderGoods(); }
function renderGoods() {
  const el = document.getElementById('gList');
  const cnt = document.getElementById('gCount');
  cnt.textContent = goodsList.length ? `(${goodsList.length}개)` : '';
  el.innerHTML = goodsList.map((g,i)=>`
    <div class="goods-tag">
      <span>📦 ${g.name}${g.item?` <span style="font-size:.7rem;background:var(--ink2);color:#fff;padding:1px 6px;border-radius:8px;margin-left:4px;">${g.item}</span>`:''}</span>
      <button class="rm" onclick="removeGoods(${i})">✕</button>
    </div>`).join('');
}

// ════════════════════════════════════
//  배송시간 (고정 2개)
// ════════════════════════════════════
const FIXED_TIMES = ['오전 9:10', '오후 1:10'];

function pickTimeFixed(idx) {
  selTime = (selTime === idx) ? null : idx;
  document.getElementById('tBtn0').classList.toggle('on', selTime === 0);
  document.getElementById('tBtn1').classList.toggle('on', selTime === 1);
}

function getTimeLabel() {
  return selTime !== null ? FIXED_TIMES[selTime] : '-';
}

function resetTimeUI() {
  selTime = null;
  document.getElementById('tBtn0').classList.remove('on');
  document.getElementById('tBtn1').classList.remove('on');
}

// ════════════════════════════════════
//  행 추가
// ════════════════════════════════════
function addRow() {
  const date = document.getElementById('fDate').value;
  const name = document.getElementById('fName').value.trim();
  const phone= document.getElementById('fPhone').value.trim();
  const amt  = document.getElementById('fAmt').value;
  const dong = document.getElementById('fDong').value.trim();
  const box  = document.getElementById('fBox').value;
  const timeLabel = getTimeLabel();

  if(!date)           return toast('날짜를 선택하세요','err');
  if(selStore===null) return toast('점포를 선택하세요','err');
  if(!name)           return toast('고객명을 입력하세요','err');
  if(!goodsList.length) return toast('물품을 추가하세요','err');

  const addr = [selGuVal, dong].filter(Boolean).join(' ') || '-';
  const store = stores[selStore];
  const groupId = Date.now();
  const amtInt = amt ? Math.round(Number(amt)) : '';

  goodsList.forEach((g, gi) => {
    rows.push({
      seq: rows.length+1, date, store, name, phone,
      goods: g.name, item: g.item||'-',
      amt: gi===0 ? amtInt : '',
      box: gi===0 ? (box||'-') : '',
      addr, gu: selGuVal||'-', time: timeLabel,
      groupId, groupFirst: gi===0, groupSize: goodsList.length
    });
  });

  saveRows(); renderTable(); updateSeq();
  toast(`✅ ${store} / ${name} — ${goodsList.length}개 추가됨`,'ok');
  resetAll();
  if(window.innerWidth<=768) mobTab(1);
  // 지도에 자동으로 마커 추가
  addPreviewMarker(addr, name, store, goodsList.map(g=>g.name).join(', '));
}

function updateSeq() { document.getElementById('fSeq').value = rows.length+1; }

function resetAll() {
  // 텍스트 필드
  ['fName','fPhone','fGoods','fAmt','fDong','fBox'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('fItem').value='';
  // 물품
  goodsList=[]; renderGoods();
  // 점포
  selStore=null; renderStores();
  // 지역구
  selGuVal=null;
  document.querySelectorAll('.gu-btn').forEach(b=>b.classList.remove('on'));
  const d=document.getElementById('guDisp');
  d.textContent='구 선택'; d.style.color='var(--muted)'; d.style.borderColor='var(--border)';
  resetTimeUI();
}

function resetFields() {
  ['fName','fPhone','fGoods','fAmt','fDong','fBox'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('fItem').value='';
  goodsList=[]; renderGoods();
  selGuVal=null;
  document.querySelectorAll('.gu-btn').forEach(b=>b.classList.remove('on'));
  const d=document.getElementById('guDisp');
  d.textContent='구 선택'; d.style.color='var(--muted)'; d.style.borderColor='var(--border)';
  selTime=null; renderTimes();
}

function saveEdit() {
  const date  = document.getElementById('fDate').value;
  const name  = document.getElementById('fName').value.trim();
  const phone = document.getElementById('fPhone').value.trim();
  const amt   = document.getElementById('fAmt').value;
  const dong  = document.getElementById('fDong').value.trim();
  const box   = document.getElementById('fBox').value;
  const timeLabel = getTimeLabel();

  if(!date)           return toast('날짜를 선택하세요','err');
  if(selStore===null) return toast('점포를 선택하세요','err');
  if(!name)           return toast('고객명을 입력하세요','err');
  if(!goodsList.length) return toast('물품을 추가하세요','err');

  const addr  = [selGuVal, dong].filter(Boolean).join(' ') || '-';
  const store = stores[selStore];
  const amtInt= amt ? Math.round(Number(amt)) : '';
  const newGroupId = _editGroupId || Date.now();

  // 기존 행 제거
  if(_editGroupId) {
    rows = rows.filter(x => x.groupId !== _editGroupId);
  } else if(_editRowIdx !== null) {
    rows.splice(_editRowIdx, 1);
  }

  // 수정된 행 삽입 (같은 위치에)
  const insertAt = rows.length; // 일단 끝에 추가
  goodsList.forEach((g, gi) => {
    rows.splice(insertAt + gi, 0, {
      seq: 0, date, store, name, phone,
      goods: g.name, item: g.item||'-',
      amt: gi===0 ? amtInt : '',
      box: gi===0 ? (box||'-') : '',
      addr, gu: selGuVal||'-', time: timeLabel,
      groupId: newGroupId,
      groupFirst: gi===0,
      groupSize: goodsList.length
    });
  });

  // 순번 재정렬
  rows.forEach((x,idx)=>x.seq=idx+1);

  // 수정 모드 해제
  _editGroupId=null; _editRowIdx=null;
  const addBtn=document.querySelector('.add-btn');
  addBtn.textContent='＋ 목록에 추가';
  addBtn.style.background='';
  addBtn.onclick=addRow;
  document.getElementById('cancelEditBtn').style.display='none';

  saveRows(); renderTable(); updateSeq();
  resetAll();
  rebuildPreviewMarkers();
  toast('✅ 수정 완료','ok');
  if(window.innerWidth<=768) mobTab(1);
}

let _map=null, _markers=[], _polyline=null;
let _previewMarkers = []; // 입력 단계 미리보기 마커

// ── 입력 시 미리보기 마커 추가 ──
async function addPreviewMarker(addr, name, store, goods) {
  if(!_map||!window.kakao||!kakao.maps.services) return;
  const res = await geocodeAddr('대전광역시 ' + addr);

  // 파란색 미리보기 마커 (동선 계산 전)
  const marker = new kakao.maps.Marker({ position:pos, map:_map });
  const overlay = new kakao.maps.CustomOverlay({
    position: pos, map: _map, yAnchor: 1,
    content: `<div style="background:#2563eb;color:#fff;font-size:11px;font-weight:900;
      padding:3px 9px;border-radius:12px;white-space:nowrap;
      border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);margin-top:-36px;
      max-width:120px;overflow:hidden;text-overflow:ellipsis;">
      ${seq}. ${name}</div>`
  });
  _previewMarkers.push(marker, overlay);
  // 지도 중심 이동
  _map.setCenter(pos);
  _map.setLevel(5);
}

// ── 미리보기 마커만 제거 ──
function clearPreviewMarkers() {
  _previewMarkers.forEach(m=>m.setMap(null));
  _previewMarkers=[];
}

// ── 전체 목록을 미리보기 마커로 다시 그리기 ──
async function rebuildPreviewMarkers() {
  clearPreviewMarkers();
  if(!_map||!window.kakao||!kakao.maps.services) return;
  const targets = rows.filter(r=>r.groupFirst||!r.groupId);
  const bounds = new kakao.maps.LatLngBounds();
  // 출발지 마커
  if(DEPART.lat) bounds.extend(new kakao.maps.LatLng(DEPART.lat,DEPART.lng));
  for(let i=0;i<targets.length;i++){
    const r=targets[i];
    const res = await geocodeAddr('대전광역시 '+r.addr);
    if(!res) continue;
    const pos=new kakao.maps.LatLng(res.lat,res.lng);
    bounds.extend(pos);
    const marker=new kakao.maps.Marker({position:pos,map:_map});
    const overlay=new kakao.maps.CustomOverlay({
      position:pos,map:_map,yAnchor:1,
      content:`<div style="background:#2563eb;color:#fff;font-size:11px;font-weight:900;
        padding:3px 9px;border-radius:12px;white-space:nowrap;
        border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);margin-top:-36px;">
        ${i+1}. ${r.name}</div>`
    });
    _previewMarkers.push(marker,overlay);
  }
  if(!bounds.isEmpty()) _map.setBounds(bounds);
}

function initMap() {
  const c=document.getElementById('kakaoMap');
  if(!c) return;
  const center = new kakao.maps.LatLng(DEPART.lat, DEPART.lng);
  _map = new kakao.maps.Map(c, { center, level:5 });
  _markers=[]; _polyline=null;
  // 출발지 마커
  const ov=new kakao.maps.CustomOverlay({position:center,map:_map,yAnchor:1,
    content:`<div style="background:#1a1a2e;color:#fff;font-weight:900;font-size:10px;padding:3px 8px;border-radius:10px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);margin-top:-36px;white-space:nowrap;">🏪 문창전통시장</div>`
  });
  _markers.push(ov);
  // geocoding으로 정밀 보정 (성공하면 업데이트)
  geocodeAddr(DEPART.addr).then(r=>{
    if(r){ DEPART.lat=r.lat; DEPART.lng=r.lng; }
  });
}

function geocodeAddr(addr) {
  return new Promise(res=>{
    if(!window.kakao||!kakao.maps.services) return res(null);
    new kakao.maps.services.Geocoder().addressSearch(addr,(result,status)=>{
      if(status===kakao.maps.services.Status.OK) res({lat:parseFloat(result[0].y),lng:parseFloat(result[0].x)});
      else res(null);
    });
  });
}

function tsp(pts) {
  if(pts.length<=1) return pts;
  const d=(a,b)=>Math.sqrt((a.lat-b.lat)**2+(a.lng-b.lng)**2);
  const vis=new Array(pts.length).fill(false);
  const route=[0]; vis[0]=true;
  for(let i=1;i<pts.length;i++){
    const last=route[route.length-1]; let near=-1,minD=Infinity;
    for(let j=0;j<pts.length;j++) if(!vis[j]){const dd=d(pts[last],pts[j]);if(dd<minD){minD=dd;near=j;}}
    route.push(near); vis[near]=true;
  }
  return route.map(i=>pts[i]);
}

async function calcRoute() {
  if(!rows.length) return toast('배송 목록이 없습니다','err');
  if(!window.kakao||!kakao.maps.services) {
    toast('카카오맵 연결 실패. 인터넷 및 도메인 설정을 확인하세요','err');
    return;
  }
  if(window.innerWidth<=768) mobTab(2);
  clearPreviewMarkers(); // 미리보기 마커 제거 후 도로 경로로 교체

  const rl=document.getElementById('routeList');
  const targets=rows.filter(r=>r.groupFirst||!r.groupId);
  rl.innerHTML=`<div style="text-align:center;padding:30px;color:var(--muted);"><div style="font-size:1.3rem;">⏳</div>주소 변환 중...(${targets.length}건)</div>`;

  if(!DEPART.lat){const dep=await geocodeAddr(DEPART.addr);if(dep){DEPART.lat=dep.lat;DEPART.lng=dep.lng;}}

  const results = await Promise.all(targets.map(async r=>{
    let res = await geocodeAddr('대전광역시 '+r.addr);
    if(!res) res = await geocodeAddr('대전광역시 '+r.addr.split(' ').slice(0,2).join(' '));
    return res ? {...res,row:r} : {failed:true,row:r};
  }));

  const ok  = results.filter(r=>!r.failed);
  const bad = results.filter(r=>r.failed);

  if(!ok.length) {
    rl.innerHTML=`<div style="padding:16px;color:var(--accent);"><b>❌ 모든 주소 변환 실패</b><br><br><small style="color:var(--muted);">${bad.map(b=>'• '+b.row.addr).join('<br>')}<br><br>도로명 주소로 입력해 주세요</small></div>`;
    return;
  }

  const allPts = DEPART.lat ? [{lat:DEPART.lat,lng:DEPART.lng,isD:true},...ok] : ok;
  const optimal = tsp(allPts);

  const delivOnly=optimal.filter(p=>!p.isD);
  window._optRoute={depart:DEPART,points:delivOnly};
  window._badList=bad;

  // 도로 경로로 지도 그리기
  toast('🗺️ 도로 경로 계산 중...','');
  await updateMapRoute();
  setTimeout(()=>kakao.maps.event.trigger(_map,'resize'),200);

  renderRouteList();
  toast(`✅ ${delivOnly.length}건 최적 동선 완료`,'ok');
}

// ── 동선 목록 렌더 (▲▼ 순서 조정 + 배송완료 버튼) ──

// ── 배송 완료 토글 ──
function toggleDone(idx) {
  const pts=window._optRoute.points;
  pts[idx].done = !pts[idx].done;
  renderRouteList();
  updateMapRouteDone();
}

// ── 완료 상태 반영한 지도 업데이트 ──
async function updateMapRouteDone() {
  if(!_map||!window._optRoute) return;
  clearMarkers();
  const allPts=[{lat:DEPART.lat,lng:DEPART.lng,isD:true},...window._optRoute.points];
  const bounds=new kakao.maps.LatLngBounds();

  // 마커 표시
  allPts.forEach((p,idx)=>{
    const pos=new kakao.maps.LatLng(p.lat,p.lng); bounds.extend(pos);
    const done=p.done||false;
    const m=new kakao.maps.Marker({position:pos,map:_map});
    const ov=new kakao.maps.CustomOverlay({position:pos,map:_map,yAnchor:1,
      content:p.isD
        ?`<div style="background:#1a1a2e;color:#fff;font-weight:900;font-size:10px;padding:3px 8px;border-radius:10px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);margin-top:-36px;white-space:nowrap;">🏪 출발</div>`
        :`<div style="background:${done?'#9ca3af':'#d4460a'};color:#fff;font-weight:900;font-size:12px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);margin-top:-34px;">${done?'✓':idx}</div>`
    });
    _markers.push(m,ov);
  });
  _map.setBounds(bounds);

  // 구간별 경로선 (완료 구간은 회색 점선)
  for(let i=0;i<allPts.length-1;i++){
    const isDone = allPts[i+1].done||false;
    const path = await getRoadPath(allPts[i],allPts[i+1]);
    const linePath = path||[
      new kakao.maps.LatLng(allPts[i].lat,allPts[i].lng),
      new kakao.maps.LatLng(allPts[i+1].lat,allPts[i+1].lng)
    ];
    const pl=new kakao.maps.Polyline({
      path: linePath,
      strokeWeight: isDone ? 3 : 5,
      strokeColor:  isDone ? '#d1d5db' : '#d4460a',
      strokeOpacity:isDone ? .5 : .85,
      strokeStyle:  isDone ? 'dashed' : 'solid',
      map: _map
    });
    _markers.push(pl);
  }
}

// ── 순서 이동 ──
function moveRoute(idx, dir) {
  const pts=window._optRoute.points;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=pts.length) return;
  // swap
  [pts[idx],pts[newIdx]]=[pts[newIdx],pts[idx]];
  // 지도 경로 업데이트
  updateMapRoute();
  renderRouteList();
  // 이동한 항목으로 스크롤
  setTimeout(()=>{
    const el=document.getElementById(`rc_${newIdx}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },50);
}

// ── 지도 경로만 업데이트 ──
// ── 실제 도로 경로 (OSRM → 실패 시 직선) ──
async function getRoadPath(origin, dest) {
  // OSRM 공개 API (OpenStreetMap 기반, CORS 허용, 무료)
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/`+
      `${origin.lng},${origin.lat};${dest.lng},${dest.lat}`+
      `?overview=full&geometries=geojson`;
    const res = await fetch(url);
    if(res.ok) {
      const data = await res.json();
      if(data.code==='Ok' && data.routes && data.routes[0]) {
        return data.routes[0].geometry.coordinates
          .map(([lng,lat]) => new kakao.maps.LatLng(lat, lng));
      }
    }
  } catch(e) {}
  return null; // 실패 시 null → 점선 직선으로 대체
}

// ── 지도 경로 업데이트 (도로 경로) ──
async function updateMapRoute() {
  if(!_map||!window._optRoute) return;
  clearMarkers();
  const allPts = [{lat:DEPART.lat,lng:DEPART.lng,isD:true},...window._optRoute.points];
  const bounds = new kakao.maps.LatLngBounds();

  // 마커 먼저 표시
  allPts.forEach((p,idx)=>{
    const pos=new kakao.maps.LatLng(p.lat,p.lng); bounds.extend(pos);
    const m=new kakao.maps.Marker({position:pos,map:_map});
    const ov=new kakao.maps.CustomOverlay({position:pos,map:_map,yAnchor:1,
      content:p.isD
        ?`<div style="background:#1a1a2e;color:#fff;font-weight:900;font-size:10px;padding:3px 8px;border-radius:10px;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);margin-top:-36px;white-space:nowrap;">🏪 출발</div>`
        :`<div style="background:#d4460a;color:#fff;font-weight:900;font-size:12px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.3);margin-top:-34px;">${idx}</div>`
    });
    _markers.push(m,ov);
  });
  _map.setBounds(bounds);

  // 구간별 실제 도로 경로
  for(let i=0;i<allPts.length-1;i++){
    const path = await getRoadPath(allPts[i], allPts[i+1]);
    if(path&&path.length>0){
      const pl=new kakao.maps.Polyline({
        path, strokeWeight:5, strokeColor:'#d4460a',
        strokeOpacity:.85, strokeStyle:'solid', map:_map
      });
      _markers.push(pl);
    } else {
      // 실패 시 직선으로 대체 (점선)
      const pl=new kakao.maps.Polyline({
        path:[new kakao.maps.LatLng(allPts[i].lat,allPts[i].lng),
              new kakao.maps.LatLng(allPts[i+1].lat,allPts[i+1].lng)],
        strokeWeight:4, strokeColor:'#d4460a',
        strokeOpacity:.5, strokeStyle:'dashed', map:_map
      });
      _markers.push(pl);
    }
  }
}

function clearMarkers() {
  _markers.forEach(m=>m.setMap(null)); _markers=[];
  if(_polyline){_polyline.setMap(null);_polyline=null;}
}

// ── 네이버 지도 (경유지 제한 없음) ──
function openNaverMap() {
  document.getElementById('mapChoiceModal')?.remove();
  const rt=window._optRoute; if(!rt||!rt.points.length) return;
  const pts=rt.points;

  // 네이버 지도 URL: start → goals(경유지) → end
  const start=`${DEPART.lat},${DEPART.lng}`;
  const startName=encodeURIComponent('문창전통시장');

  // 네이버 지도는 경유지+목적지를 goal 파라미터로 받음
  // 최대 5개 경유 가능 (실제로는 더 많이 되기도 함)
  let url=`nmap://route/car?slat=${DEPART.lat}&slng=${DEPART.lng}&sname=${startName}`;

  pts.forEach((p,i)=>{
    const name=encodeURIComponent(p.row.name);
    if(i<pts.length-1){
      url+=`&v${i+1}lat=${p.lat}&v${i+1}lng=${p.lng}&v${i+1}name=${name}`;
    } else {
      url+=`&dlat=${p.lat}&dlng=${p.lng}&dname=${name}`;
    }
  });
  url+=`&appname=delivery`;

  // 웹 fallback URL (네이버 지도 웹)
  const webParts=[
    `start=${DEPART.lng},${DEPART.lat},${encodeURIComponent('문창전통시장')}`,
    ...pts.map((p,i)=>`goal=${p.lng},${p.lat},${encodeURIComponent(p.row.name)}`)
  ];
  const webUrl=`https://map.naver.com/v5/directions/${webParts.join('/')}`;

  if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
    window.location.href=url;
    setTimeout(()=>window.open(webUrl,'_blank'),2000);
  } else {
    window.open(webUrl,'_blank');
  }
}

// ── 카카오맵 (3개씩 분할) - 구간 선택 UI ──
function openKakaoChunk(startIdx) {
  document.getElementById('mapChoiceModal')?.remove();
  const rt=window._optRoute; if(!rt||!rt.points.length) return;
  const pts=rt.points;

  // 전체 구간 목록 모달 표시
  const chunks=[];
  for(let i=0;i<pts.length;i+=3) chunks.push(i);

  if(chunks.length===1) {
    // 구간 하나면 바로 열기
    _openKakaoSeg(0, pts);
    return;
  }

  // 여러 구간이면 선택 화면
  const modal=document.createElement('div');
  modal.id='kakaoSegModal';
  modal.style.cssText=`position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9100;display:flex;align-items:flex-end;justify-content:center;`;
  const segBtns=chunks.map((si,ci)=>{
    const end=Math.min(si+3,pts.length);
    const names=pts.slice(si,end).map((p,i)=>`${si+i+1}.${p.row.name}`).join(' → ');
    return `<button onclick="_openKakaoSeg(${si},window._optRoute.points);document.getElementById('kakaoSegModal')?.remove();"
      style="padding:12px;background:#FEE500;color:#3C1E1E;border:none;border-radius:10px;
      font-size:.82rem;font-weight:700;font-family:inherit;cursor:pointer;text-align:left;touch-action:manipulation;">
      📍 구간${ci+1}: ${names}
    </button>`;
  }).join('');

  modal.innerHTML=`
    <div style="background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:480px;max-height:70vh;overflow-y:auto;">
      <div style="font-size:.9rem;font-weight:800;margin-bottom:12px;">🟡 카카오맵 구간 선택</div>
      <div style="font-size:.75rem;color:#6b7280;margin-bottom:10px;">카카오맵은 3곳씩 나눠서 열립니다. 구간을 순서대로 눌러주세요.</div>
      <div style="display:flex;flex-direction:column;gap:7px;">${segBtns}</div>
      <button onclick="document.getElementById('kakaoSegModal')?.remove()"
        style="width:100%;margin-top:10px;padding:11px;background:#f3f4f6;color:#6b7280;border:none;border-radius:10px;font-size:.83rem;font-family:inherit;cursor:pointer;">취소</button>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click',e=>{ if(e.target===modal) modal.remove(); });
}

function _openKakaoSeg(startIdx, pts) {
  const chunk=pts.slice(startIdx, startIdx+3);
  const origin = startIdx===0
    ? {lat:DEPART.lat, lng:DEPART.lng}
    : pts[startIdx-1];
  const dest=chunk[chunk.length-1];
  const vias=chunk.slice(0,-1);
  const destName=encodeURIComponent(dest.row.name+' '+dest.row.addr);

  let appUrl=`kakaomap://route?sp=${origin.lat},${origin.lng}&ep=${dest.lat},${dest.lng}&by=CAR`;
  vias.forEach((p,i)=>{ appUrl+=`&via${i+1}=${p.lat},${p.lng}`; });

  const webUrl=`https://map.kakao.com/link/to/${destName},${dest.lat},${dest.lng}`;

  if(/Android|iPhone|iPad/i.test(navigator.userAgent)){
    window.location.href=appUrl;
    setTimeout(()=>window.open(webUrl,'_blank'),2500);
  } else {
    window.open(webUrl,'_blank');
  }
}

function shareRoute() {
  const rt=window._optRoute; if(!rt||!rt.points.length) return;
  const date=document.getElementById('fDate').value;
  const txt=[
    `🚐 ${date} 배송 동선 (${rt.points.length}건)`,
    `📍 출발: 문창전통시장`, '',
    ...rt.points.map((p,i)=>{
      const r=p.row;
      const g=rows.filter(x=>r.groupId?x.groupId===r.groupId:x===r).map(x=>x.goods).join(', ');
      return `${i+1}. ${r.name} (${r.addr})\n   📦 ${g}${r.phone?'\n   📞 '+r.phone:''}`;
    }),
    '', `🗺️ https://sketchkim-hub.github.io/delivery`
  ].join('\n');
  if(navigator.share) {
    navigator.share({title:`${date} 배송 동선`,text:txt}).catch(()=>copyText(txt));
  } else { copyText(txt); }
}
function copyText(txt) {
  if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>toast('📋 복사됨 — 카톡에 붙여넣기 하세요','ok')).catch(()=>fallCopy(txt));
  else fallCopy(txt);
}
function fallCopy(txt) {
  const ta=document.createElement('textarea'); ta.value=txt;
  ta.style.cssText='position:fixed;opacity:0;'; document.body.appendChild(ta);
  ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  toast('📋 복사됨 — 카톡에 붙여넣기 하세요','ok');
}

    // 패널이 표시된 후 지도 초기화
    setTimeout(()=>{
      const c = document.getElementById('kakaoMap');
      if(!c || !window.kakao || !kakao.maps) return;

      // iOS Safari: 컨테이너 크기 강제 지정
      c.style.width  = '100%';
      c.style.height = '45vh';
      c.style.minHeight = '200px';

      kakao.maps.load(()=>{
        // 항상 새로 생성 (iOS에서 가장 안정적)
        _map = new kakao.maps.Map(c, {
          center: new kakao.maps.LatLng(DEPART.lat, DEPART.lng),
          level: 5
        });
        _markers = []; _polyline = null;

        // resize 이벤트 두 번 발생 (iOS 대응)
        kakao.maps.event.trigger(_map, 'resize');
        setTimeout(()=>{
          kakao.maps.event.trigger(_map, 'resize');
          _map.setCenter(new kakao.maps.LatLng(DEPART.lat, DEPART.lng));
          _map.setLevel(5);
          // 기존 동선이 있으면 다시 그리기
          if(window._optRoute && window._optRoute.points.length) {
            updateMapRouteDone();
          } else if(rows.length) {
            rebuildPreviewMarkers();
          }
        }, 300);
      });
    }, 100);
  }
}

// ════════════════════════════════════
//  토스트
// ════════════════════════════════════
function toast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.className='toast',2500);
}
</script>
